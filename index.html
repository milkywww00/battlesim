<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Battle Simulator</title>

  <style>
    .characterCard{

    border:1px solid gray;

    margin-bottom:10px;

    padding:10px;

    width:260px;

    background:#222;

    color:white;

    border-radius:8px;
}

.bar{

    width:100%;

    height:12px;

    background:#555;

    border-radius:5px;

    overflow:hidden;

    margin:4px 0;
}

.hpBar{

    background:#ff4444;

    height:100%;
}

.mpBar{

    background:#3399ff;

    height:100%;
}

.currentTurn{

    border:3px solid gold;

    box-shadow:0 0 15px gold;

    transform:scale(1.03);

    transition:.2s;
}

.statusRow{

    margin-top:8px;

    font-size:22px;
}

.dead{

    opacity:.35;

    filter:grayscale(100%);
}
    .selected {
      background: yellow;
      font-weight: bold;
    }

    #log {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: auto;
      white-space: pre-line;
      background: #111;
      color: #eee;
      font-family: monospace;
    }

    button {
      margin: 3px;
    }
  </style>
</head>

<body>

  <h1>Battle Simulator</h1>

  <div id="game">

    <h2 id="turnInfo"></h2>

    <!-- 캐릭터 상태 표시용 (원하면 나중에 사용) -->
    <div style="display:flex; gap:50px">

  <div>
    <h3>Team 1</h3>
    <div id="team1"></div>
  </div>

  <div>
    <h3>Team 2</h3>
    <div id="team2"></div>
  </div>

</div>

    <h3>Skills</h3>
    <div id="skills"></div>

    <h3>Targets</h3>
    <div id="targets"></div>

    <button id="confirmBtn">행동 확정</button>
    <button id="skipBtn">턴 스킵</button>
<h3>Target Select</h3>
    <div id="debugTargets"></div>

    <h3>Debug Control</h3>
    <input id="hpInput" type="number" value="10" />
    <button id="hpPlus">HP +</button>
    <button id="hpMinus">HP -</button>

    <input id="mpInput" type="number" value="10" />
    <button id="mpPlus">MP +</button>
    <button id="mpMinus">MP -</button>

    <input id="statusInput" type="text" placeholder="dot / stat_mod / stun ..." />
    <button id="addStatus">상태이상 추가</button>

    <h3>Log</h3>
    <div id="log"></div>

  </div>

  <script type="module" src="./src/main.js"></script>

</body>
</html>
