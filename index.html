button:disabled{

    button{

body{

      :root {
      --bg: #060b16;
      --bg-soft: #0f1729;
      --panel: rgba(16, 24, 40, 0.92);
      --panel-2: rgba(24, 34, 54, 0.9);

    body {

    .battleHeader,

    }

    .title {

    }

    .turnBanner {

<div id="app"></div>

<script>
  const updateDeviceMode = () => {
    const touch = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const narrow = window.matchMedia('(max-width: 900px)').matches;
    const isMobile = touch && narrow;
    document.documentElement.classList.toggle('is-mobile', isMobile);
    document.body.classList.toggle('is-mobile', isMobile);
    document.documentElement.setAttribute('data-device', isMobile ? 'mobile' : 'desktop');
  };

  updateDeviceMode();
  window.addEventListener('resize', updateDeviceMode);
  window.addEventListener('orientationchange', updateDeviceMode);
</script>
