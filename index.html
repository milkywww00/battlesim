<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Battle Simulator</title>

  <style>

    #log{

height:260px;

overflow-y:auto;

border-radius:12px;

padding:15px;

background:#111;

}

#skills{

    max-height:130px;

    overflow-y:auto;

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));

    gap:8px;

}
#targets{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

}

.log-line{
    margin:3px 0;
    padding:3px 6px;
    border-left:4px solid #555;
}

.log-damage{
    color:#ff6b6b;
    border-color:#ff6b6b;
}

.log-heal{
    color:#4cd964;
    border-color:#4cd964;
}

.log-status{
    color:#ffd43b;
    border-color:#ffd43b;
}

.log-system{
    color:#74c0fc;
    border-color:#74c0fc;
}

.log-turn{
    color:white;
    background:#444;
    text-align:center;
    font-weight:bold;
    margin:8px 0;
    padding:5px;
}
  .characterCard{

    background:#2b2f38;

    border:1px solid #444;

    border-radius:14px;

    padding:15px;

    box-shadow:0 6px 15px rgba(0,0,0,.35);

    transition:.2s;

}

.characterCard:hover{

    transform:translateY(-4px);

    border-color:#6da7ff;

}

.bar{

    width:100%;

    height:12px;

    background:#555;

    border-radius:5px;

    overflow:hidden;

    margin:4px 0;
}

.hpBar{

    background:#ff4444;

    height:100%;
}

.mpBar{

    background:#3399ff;

    height:100%;
}

.cardHeader{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:10px;

}

.typeCircle{

    width:14px;

    height:14px;

    border-radius:50%;

    display:inline-block;

}

.currentTurn{

    border:3px solid gold;

    box-shadow:0 0 15px gold;

    transform:scale(1.03);

    transition:.2s;
}

.statusRow{

    margin-top:8px;

    font-size:22px;
}

.dead{

    opacity:.35;

    filter:grayscale(100%);
}
    .selected {
      background: yellow;
      font-weight: bold;
    }

    #log {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      height: 200px;
      overflow-y: auto;
      white-space: pre-line;
      background: #111;
      color: #eee;
      font-family: monospace;
    }

    #skills button{

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    gap:4px;

    min-width:90px;

    min-height:55px;

}

.skillName{

    font-weight:bold;

    font-size:14px;

}

.skillCost{

    font-size:11px;

    color:#cfd8dc;

    opacity:.85;

}

button:disabled{

    opacity:.45;

    cursor:not-allowed;

}

    button{

    background:#3f72ff;

    color:white;

    border:none;

    border-radius:10px;

    padding:7px 12px;

    font-size:14px;

    border-radius:8px;

    cursor:pointer;

}

button:hover{

    background:#5f8dff;

}

.selected{

    background:#ffb703 !important;

    color:black;

    box-shadow:0 0 10px #ffb703;

}

body{

    margin:0;

    background:#20242d;

    color:white;

    font-family:Segoe UI,sans-serif;

}

.battleContainer{

    width:1200px;

    margin:auto;

    padding:20px;

}

.title{

    margin-bottom:10px;

}

.turnBanner{

    font-size:26px;

    font-weight:bold;

    padding:12px;

    border-radius:10px;

    background:#2d3340;

    margin-bottom:20px;

}

.battleTop{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:30px;

}

.teamGrid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:15px;

}

.battleLogPanel{

    margin-top:25px;

}

.actionPanel{

    margin-top:25px;

}

.battleButtons{

    display:flex;

    justify-content:center;

    gap:20px;

    margin-top:20px;

}

.debugPanel{

    margin-top:35px;

}
  </style>
</head>

<body>

<div id="app"></div>

<script type="module" src="./src/main.js"></script>

</body>
</html>
